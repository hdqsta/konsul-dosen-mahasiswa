<!DOCTYPE html>

<html class="dark" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: {
                DEFAULT: '#D0BCFF',
                container: '#4F378B',
                fixed: '#EADDFF'
              },
              on: {
                primary: {
                  DEFAULT: '#381E72',
                  container: '#EADDFF'
                },
                surface: {
                  DEFAULT: '#E6E1E5',
                  variant: '#CAC4D0'
                }
              },
              surface: {
                DEFAULT: '#1C1B1F',
                container: {
                  lowest: '#0F0D13',
                  low: '#1D1B20',
                  high: '#2B2930'
                }
              },
              outline: {
                DEFAULT: '#938F99',
                variant: '#49454F'
              }
            },
            borderRadius: {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "2xl": "1rem",
              "full": "9999px"
            },
            fontFamily: {
              "headline": ["Inter"],
              "display": ["Inter"],
              "body": ["Inter"],
              "label": ["Public Sans"]
            }
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        background-color: #0F0D13;
      }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface min-h-screen flex flex-col font-body">
<!-- Suppressing SideNavBar and TopNavBar as per "Destination Rule" (Transactional Page) -->
<main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
<!-- Abstract Background Element -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary-container/20 blur-[120px] rounded-full"></div>
<div class="w-full max-w-[440px] z-10">
<!-- Brand Identity -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary-container mb-4 shadow-xl">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="school">school</span>
</div>
<h1 class="font-headline font-black text-3xl tracking-tight text-on-surface">AcademiaConsult</h1>
<p class="font-label text-on-surface-variant mt-2 text-sm">Masuk ke Portal Akademik Terpadu</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-low border border-outline-variant p-8 rounded-2xl shadow-2xl backdrop-blur-sm">
<form class="space-y-6">
<!-- Input NIM/NIP -->
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface-variant" for="id-number">NIM / NIP</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="person">person</span>
<input class="w-full bg-surface-container-high border border-outline-variant text-on-surface rounded-xl py-3 pl-12 pr-4 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-outline/50" id="id-number" placeholder="Contoh: 12345678" type="text"/>
</div>
</div>
<!-- Input Password -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block font-label text-sm font-medium text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary-fixed transition-colors" href="#">Lupa Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-high border border-outline-variant text-on-surface rounded-xl py-3 pl-12 pr-12 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-outline/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="w-5 h-5 rounded border-outline-variant bg-surface-container-high text-primary focus:ring-primary focus:ring-offset-surface cursor-pointer" id="remember" type="checkbox"/>
<label class="ml-3 font-label text-sm text-on-surface-variant cursor-pointer select-none" for="remember">Ingat Saya</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-bold py-4 rounded-xl shadow-lg hover:shadow-primary/20 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
<span>Masuk</span>
<span class="material-symbols-outlined text-[20px]" data-icon="login">login</span>
</button>
</form>
<div class="mt-8 pt-6 border-t border-outline-variant flex flex-col gap-4">
<div class="flex items-center justify-between text-xs text-on-surface-variant font-label">
<span class="flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="verified_user">verified_user</span>
                            Enkripsi SSL 256-bit
                        </span>
<a class="hover:text-primary underline" href="#">Kebijakan Privasi</a>
</div>
</div>
</div>
</div>
</main>
<!-- Footer for Login Page -->
<footer class="p-8 mt-auto">
<div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 text-on-surface-variant">
<div class="flex items-center gap-6">
<a class="flex items-center gap-2 hover:text-on-surface transition-colors font-label text-sm" href="#">
<span class="material-symbols-outlined text-[20px]" data-icon="help">help</span>
<span>Bantuan</span>
</a>
<a class="flex items-center gap-2 hover:text-on-surface transition-colors font-label text-sm" href="#">
<span class="material-symbols-outlined text-[20px]" data-icon="contact_support">contact_support</span>
<span>Kontak Admin</span>
</a>
</div>
<!-- Language Selection -->
<div class="flex items-center gap-3 bg-surface-container-high px-4 py-2 rounded-full border border-outline-variant">
<span class="material-symbols-outlined text-[18px]" data-icon="language">language</span>
<select class="bg-transparent border-none text-sm font-label focus:ring-0 cursor-pointer text-on-surface">
<option selected="" value="id">Bahasa Indonesia</option>
<option value="en">English (US)</option>
<option value="jp">日本語</option>
</select>
</div>
<div class="text-xs font-label">
                © 2024 AcademiaConsult. All rights reserved.
            </div>
</div>
</footer>
<!-- Decorative Screen Visuals as requested (Hidden for screen readers) -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] z-[-1]">
<img aria-hidden="true" class="w-full h-full object-cover" data-alt="A sophisticated network of glowing digital lines and nodes representing data connectivity and security. The aesthetic is futuristic and high-tech, featuring a dark palette with deep charcoal and midnight blue tones. Subtle points of light pulse throughout the crystalline structures, creating a sense of a living, secure academic infrastructure in a dark mode environment. The overall atmosphere is professional, sleek, and highly technological." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDNeD_TrnYxuJOcWSIN18QxCujZ-9IvLdloqeFUBrTu0mmeeNf6BXt8sHmBkaFNpbQ77lprscaDgPYFvz69DNrIoDbV8ogh4wltUMNA6AKJbSHCX8mMPqb4bbBqgFZNvSo1BIDgE_MVI6zMKdENeSp3j4ffT3v9h2HHexT4qYEzmYd4leUZs1j1PQJ4jxJkGVz_oT5aSizO6wSEmzne0D3RxJSvDc0WEYiYlLAmg-W1yYpyWju_Apjy_ofe4RYgFb57MyCSGLsex-4"/>
</div>
</body></html>
